name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint pipeline
        run: npm run lint

      - name: Test pipeline
        run: npm test

      - name: Prisma generate (build sanity)
        run: npx prisma generate

      - name: Validate migrations match schema
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
          DIRECT_URL: postgresql://ci:ci@127.0.0.1:5432/ci
        run: |
          OUT=$(npx prisma migrate diff --from-migrations prisma/migrations --to-schema-datamodel prisma/schema.prisma --script)
          if [ -n "$OUT" ]; then echo "Migration drift: schema and prisma/migrations differ."; echo "$OUT"; exit 1; fi

      - name: Build Docker image
        run: docker build -t titanos-backend:ci .
